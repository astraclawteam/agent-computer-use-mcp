name: nightly-perception

on:
  workflow_dispatch:
  schedule:
    - cron: "29 20 * * *"

permissions:
  contents: read

jobs:
  full-perception-corpus:
    runs-on: [self-hosted, windows, x64, computer-use-app-lab]
    timeout-minutes: 90
    env:
      AGENT_COMPUTER_USE_PERCEPTION_CORPUS: ${{ vars.PERCEPTION_CORPUS_ROOT }}
      AGENT_COMPUTER_USE_OCR_MODEL_DIR: ${{ vars.APP_LAB_OCR_MODEL_DIR }}
      AGENT_COMPUTER_USE_NETWORK_DISABLED: "1"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24.12.0"
          package-manager-cache: false
      - run: npm ci

      - name: Verify hash-locked perception corpus and privacy
        shell: pwsh
        run: node scripts/verify-perception-corpus.mjs --root "$env:AGENT_COMPUTER_USE_PERCEPTION_CORPUS" --lock docs/productization/perception-corpus.lock.json --tier full

      - name: Run released providers against the full corpus
        run: npm run perception:full -- --evidence-root evidence/perception

      - name: Verify full perception evidence
        if: always()
        shell: pwsh
        run: |
          $run = Get-ChildItem -LiteralPath "evidence/perception" -Directory -ErrorAction Stop |
            Sort-Object LastWriteTimeUtc -Descending |
            Select-Object -First 1
          if ($null -eq $run) { throw "perception evidence was not created" }
          npm run evidence:verify -- $run.FullName

      - name: Upload sanitized full perception evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: commercial-full-perception-evidence
          path: |
            evidence/perception/**/run-manifest.json
            evidence/perception/**/events.jsonl
            evidence/perception/**/report.json
            evidence/perception/**/checksums.txt
          if-no-files-found: error
          retention-days: 30
