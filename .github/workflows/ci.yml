name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: test
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Verify protected npm release
        run: npm run phase:0.14

      - name: Verify standard MCP install contract
        run: npm run phase:1.6

      - name: Verify official MCP SDK client
        run: npm run phase:1.7

      - name: Verify official MCP SDK server transport
        run: npm run phase:1.8

      - name: Verify transactional Windows installer
        run: npm run phase:7.8
