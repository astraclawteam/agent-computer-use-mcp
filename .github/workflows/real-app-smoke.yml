name: real-app-smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "41 19 * * 2,5"

permissions:
  contents: read

jobs:
  real-app-smoke:
    runs-on: [self-hosted, windows, x64, computer-use-app-lab]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24.12.0"
          package-manager-cache: false
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - run: npm ci
      - run: dotnet build native-lab/NativeComputerUseLab.csproj --nologo
      - name: Run real applications with sanitized evidence
        env:
          AGENT_COMPUTER_USE_CUA_DRIVER: ${{ vars.APP_LAB_CUA_DRIVER_PATH }}
          AGENT_COMPUTER_USE_REAL_APP_REPORT: artifacts/app-smoke/real-app-smoke-report.json
        run: npm run phase:6.2
      - uses: actions/upload-artifact@v4
        with:
          name: real-app-smoke-report
          path: artifacts/app-smoke/real-app-smoke-report.json
          if-no-files-found: error
          retention-days: 30
