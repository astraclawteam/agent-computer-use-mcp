name: platform release validation

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build-windows-x64:
    name: build Windows x64 release with production assets
    runs-on: windows-2025
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install dependencies
        run: npm ci

      - name: Assemble production platform release
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts/platform-validation | Out-Null
          node scripts/build-platform-release.mjs --allow-network |
            Tee-Object -FilePath artifacts/platform-validation/build-report.json

      - name: Report production artifact sizes
        shell: pwsh
        run: |
          node scripts/windows-release-size-report.mjs |
            Tee-Object -FilePath artifacts/platform-validation/size-report.json

      - name: Upload validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: platform-release-validation
          path: |
            artifacts/platform-release
            artifacts/platform-validation
          if-no-files-found: error
          retention-days: 3
