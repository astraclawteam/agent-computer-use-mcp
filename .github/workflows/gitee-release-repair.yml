name: Repair Gitee Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing published GitHub v* tag to mirror
        required: true
        type: string

permissions:
  contents: read

jobs:
  repair-gitee-release:
    runs-on: ubuntu-latest
    environment: gitee-release-repair
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: "24.12.0"
          package-manager-cache: false
      - id: release
        name: Bind repair to an immutable published release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
        run: |
          printf '%s\n' "${TAG}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'
          git fetch origin main
          git fetch origin "refs/tags/${TAG}:refs/tags/${TAG}" --force
          SOURCE_COMMIT="$(git rev-parse "${TAG}^{commit}")"
          git merge-base --is-ancestor "${SOURCE_COMMIT}" origin/main
          MAIN_COMMIT="$(git rev-parse origin/main)"
          test "$(gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" --json isDraft --jq .isDraft)" = "false"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "source_commit=${SOURCE_COMMIT}" >> "${GITHUB_OUTPUT}"
          echo "main_commit=${MAIN_COMMIT}" >> "${GITHUB_OUTPUT}"
      - name: Download authoritative GitHub bytes
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release download "${{ steps.release.outputs.tag }}" --repo "${GITHUB_REPOSITORY}" --dir mirror-assets
      - name: Download authoritative GitHub release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release view "${{ steps.release.outputs.tag }}" --repo "${GITHUB_REPOSITORY}" --json body --jq .body > "${RUNNER_TEMP}/github-release-notes.md"
      - name: Fast-forward Gitee main and create the immutable release tag
        env:
          GITEE_OWNER: ${{ vars.GITEE_OWNER }}
          GITEE_REPO: ${{ vars.GITEE_REPO }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_SOURCE_COMMIT: ${{ steps.release.outputs.source_commit }}
          GITEE_MAIN_COMMIT: ${{ steps.release.outputs.main_commit }}
        run: node scripts/sync-gitee-release-ref.mjs
      - name: Mirror quota-safe assets to Gitee
        env:
          GITEE_OWNER: ${{ vars.GITEE_OWNER }}
          GITEE_REPO: ${{ vars.GITEE_REPO }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_SOURCE_COMMIT: ${{ steps.release.outputs.source_commit }}
          RELEASE_NOTES_PATH: ${{ runner.temp }}/github-release-notes.md
          RELEASE_ASSET_ROOT: mirror-assets
        run: node scripts/mirror-gitee-release.mjs
      - name: Verify remote parts and reconstructed identities
        env:
          GITEE_OWNER: ${{ vars.GITEE_OWNER }}
          GITEE_REPO: ${{ vars.GITEE_REPO }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_SOURCE_COMMIT: ${{ steps.release.outputs.source_commit }}
          RELEASE_NOTES_PATH: ${{ runner.temp }}/github-release-notes.md
          RELEASE_ASSET_ROOT: mirror-assets
        run: node scripts/verify-gitee-release.mjs
