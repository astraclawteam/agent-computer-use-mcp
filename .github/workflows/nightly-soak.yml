name: nightly-runtime-soak

on:
  schedule:
    - cron: "17 18 * * *"

permissions:
  contents: read

jobs:
  runtime-soak:
    runs-on: windows-2025
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24.12.0"
          package-manager-cache: false
      - run: npm ci
      - name: Run two-hour fault-injected soak
        run: node src/phase-8-0-runtime-soak.mjs --duration-ms 7200000 --clients 4 --concurrency 3 --fault-every-rounds 100
