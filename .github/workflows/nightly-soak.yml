name: nightly-runtime-soak

on:
  schedule:
    - cron: "17 18 * * *"

permissions:
  contents: read

jobs:
  runtime-soak:
    runs-on: windows-2025
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24.12.0"
          package-manager-cache: false
      - run: npm ci
      - name: Run two-hour commercial soak
        run: npm run phase:8.0 -- --gate nightly --duration-ms 7200000 --evidence-root evidence/nightly --seed 20260713

      - name: Verify nightly soak evidence
        if: always()
        shell: pwsh
        run: |
          $run = Get-ChildItem -LiteralPath "evidence/nightly" -Directory -ErrorAction Stop |
            Sort-Object LastWriteTimeUtc -Descending |
            Select-Object -First 1
          if ($null -eq $run) { throw "nightly soak evidence was not created" }
          npm run evidence:verify -- $run.FullName

      - name: Upload nightly soak evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: commercial-nightly-soak-evidence
          path: |
            evidence/nightly/**/run-manifest.json
            evidence/nightly/**/events.jsonl
            evidence/nightly/**/report.json
            evidence/nightly/**/checksums.txt
          if-no-files-found: error
          retention-days: 30
