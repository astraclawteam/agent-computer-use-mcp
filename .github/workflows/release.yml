name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  validate:
    runs-on: windows-2025
    outputs:
      version: ${{ steps.release.outputs.version }}
      generated_at: ${{ steps.release.outputs.generated_at }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: "24.12.0"
          package-manager-cache: false
      - run: npm ci
      - id: release
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          test "${GITHUB_REF_NAME}" = "v${VERSION}"
          git fetch origin main
          git merge-base --is-ancestor "${GITHUB_SHA}" origin/main
          grep -Eq "^##[[:space:]]+(\\[)?${VERSION}(\\])?([[:space:]]|$)" CHANGELOG.md
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "generated_at=$(git show -s --format=%cI HEAD)" >> "${GITHUB_OUTPUT}"
      - run: npm test

  build-release:
    needs: validate
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: "24.12.0"
          package-manager-cache: false
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - run: npm ci
      - name: Build exact npm packages and complete ZIP
        env:
          AGENT_COMPUTER_USE_RELEASE_GENERATED_AT: ${{ needs.validate.outputs.generated_at }}
        run: node scripts/build-platform-release.mjs --allow-network
      - run: npm run release:windows:size-report
      - uses: actions/upload-artifact@v4
        with:
          name: platform-release-assets
          path: artifacts/platform-release/${{ needs.validate.outputs.version }}
          if-no-files-found: error
          retention-days: 7

  draft-github-release:
    needs: [validate, build-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: platform-release-assets
          path: release-assets
      - name: Create immutable draft boundary
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" release-assets/* --repo "${GITHUB_REPOSITORY}" --draft --verify-tag --title "${GITHUB_REF_NAME}" --generate-notes

  publish-platform-npm:
    needs: [validate, draft-github-release]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: "24.12.0"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - uses: actions/download-artifact@v4
        with:
          name: platform-release-assets
          path: release-assets
      - run: npm publish "./release-assets/agent-computer-use-win32-x64-${{ needs.validate.outputs.version }}.tgz" --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_PLATFORM_TOKEN }}

  publish-core-npm:
    needs: [validate, publish-platform-npm]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: "24.12.0"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - uses: actions/download-artifact@v4
        with:
          name: platform-release-assets
          path: release-assets
      - run: npm publish "./release-assets/agent-computer-use-mcp-${{ needs.validate.outputs.version }}.tgz" --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_CORE_TOKEN }}

  post-publish-npm-smoke:
    needs: [validate, publish-core-npm]
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24.12.0"
          package-manager-cache: false
      - run: npm ci
      - run: node scripts/post-publish-smoke.mjs

  publish-github-release:
    needs: post-publish-npm-smoke
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish only after public npm smoke passes
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --draft=false

  mirror-gitee-release:
    needs: publish-github-release
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24.12.0"
          package-manager-cache: false
      - run: npm ci
      - name: Download published GitHub bytes
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release download "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --dir mirror-assets
      - name: Download authoritative GitHub release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --json body --jq .body > "${RUNNER_TEMP}/github-release-notes.md"
      - name: Mirror exact assets to Gitee
        env:
          GITEE_OWNER: ${{ vars.GITEE_OWNER }}
          GITEE_REPO: ${{ vars.GITEE_REPO }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_SOURCE_COMMIT: ${{ github.sha }}
          RELEASE_NOTES_PATH: ${{ runner.temp }}/github-release-notes.md
          RELEASE_ASSET_ROOT: mirror-assets
        run: node scripts/mirror-gitee-release.mjs

  verify-gitee-release:
    needs: mirror-gitee-release
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24.12.0"
          package-manager-cache: false
      - run: npm ci
      - name: Download authoritative GitHub bytes
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release download "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --dir mirror-assets
      - name: Download authoritative GitHub release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --json body --jq .body > "${RUNNER_TEMP}/github-release-notes.md"
      - name: Verify Gitee attachment hashes
        env:
          GITEE_OWNER: ${{ vars.GITEE_OWNER }}
          GITEE_REPO: ${{ vars.GITEE_REPO }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_SOURCE_COMMIT: ${{ github.sha }}
          RELEASE_NOTES_PATH: ${{ runner.temp }}/github-release-notes.md
          RELEASE_ASSET_ROOT: mirror-assets
        run: node scripts/verify-gitee-release.mjs
