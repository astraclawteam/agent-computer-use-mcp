name: Release npm artifacts

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  validate:
    runs-on: windows-2025
    outputs:
      version: ${{ steps.release.outputs.version }}
      generated_at: ${{ steps.release.outputs.generated_at }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: "24.12.0"
          package-manager-cache: false
      - run: npm ci
      - id: release
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          test "${GITHUB_REF_NAME}" = "v${VERSION}"
          git fetch origin main
          git merge-base --is-ancestor "${GITHUB_SHA}" origin/main
          grep -Eq "^##[[:space:]]+(\\[)?${VERSION}(\\])?([[:space:]]|$)" CHANGELOG.md
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "generated_at=$(git show -s --format=%cI HEAD)" >> "${GITHUB_OUTPUT}"
      - run: npm test

  build-npm-artifacts:
    needs: validate
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: "24.12.0"
          package-manager-cache: false
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - run: npm ci
      - name: Build, smoke, and pack exact npm tarballs
        env:
          AGENT_COMPUTER_USE_RELEASE_GENERATED_AT: ${{ needs.validate.outputs.generated_at }}
        run: node scripts/build-platform-release.mjs --allow-network
      - uses: actions/upload-artifact@v4
        with:
          name: npm-release-tarballs
          path: artifacts/platform-release/${{ needs.validate.outputs.version }}/*.tgz
          if-no-files-found: error
          retention-days: 7
