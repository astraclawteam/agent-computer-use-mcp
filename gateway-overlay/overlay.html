<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gateway Computer Use Overlay</title>
    <style>
      :root {
        --clay-rgb: 217 119 87;
        --clay-deep-rgb: 184 89 59;
        --computer-use-wave-rgb: var(--clay-rgb);
        --computer-use-wave-fill-alpha: .38;
        --computer-use-wave-mid-alpha: .18;
        --computer-use-wave-current-primary-alpha: .34;
        --computer-use-wave-current-secondary-alpha: .22;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: transparent;
        pointer-events: none;
      }

      canvas {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        display: block;
        pointer-events: none;
      }

      .target-frame {
        position: fixed;
        display: none;
        pointer-events: none;
        border: 2px solid rgb(var(--computer-use-wave-rgb) / .78);
        box-shadow:
          0 0 0 1px rgb(255 255 255 / .55),
          0 0 28px rgb(var(--computer-use-wave-rgb) / .32),
          inset 0 0 18px rgb(var(--computer-use-wave-rgb) / .12);
        border-radius: 10px;
        opacity: .96;
      }

      .target-frame::before,
      .target-frame::after {
        content: "";
        position: absolute;
        inset: -6px;
        border-radius: 14px;
        border: 1px solid rgb(var(--computer-use-wave-rgb) / .22);
      }

      .target-frame::after {
        inset: 4px;
        border-color: rgb(255 255 255 / .28);
      }
    </style>
  </head>
  <body>
    <canvas id="wave-overlay" aria-hidden="true"></canvas>
    <div id="target-frame" class="target-frame" aria-hidden="true"></div>
    <script type="module">
      import { createWaveOverlay } from "../public/wave-overlay.mjs";

      createWaveOverlay(document.getElementById("wave-overlay")).start();

      const targetFrame = document.getElementById("target-frame");
      window.__setComputerUseTargetRect = (rect) => {
        if (!rect || rect.width < 24 || rect.height < 24) {
          targetFrame.style.display = "none";
          return;
        }

        targetFrame.style.display = "block";
        targetFrame.style.left = `${rect.x}px`;
        targetFrame.style.top = `${rect.y}px`;
        targetFrame.style.width = `${rect.width}px`;
        targetFrame.style.height = `${rect.height}px`;
      };
    </script>
  </body>
</html>
